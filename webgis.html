<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>中轴之韵 · 北京中轴线时空叙事 | 空间叙事Web应用</title>
    <!-- 引入 Leaflet 核心库 (地图核心) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 引入字体 & 动画库辅助美观 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-color: #1a2a32;
        }

        /* 整体布局：地图占绝对主导 (>50%视觉面积) */
        #map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #cbd5e0;
        }

        /* 叙事面板：半透明浮动，不遮挡地图核心交互，但辅助文字/图表，贴合主题 */
        .story-panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            max-width: 380px;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border-left: 4px solid #e6b422;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
            padding: 1.2rem 1.4rem;
            color: #f0ede8;
            z-index: 2;
            transition: all 0.3s ease;
            pointer-events: auto;
            font-weight: 400;
        }

        .story-panel h2 {
            font-size: 1.55rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
            color: #ffdf8c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .story-panel h2 i {
            font-size: 1.4rem;
            color: #e6b422;
        }

        .story-sub {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c0b9a8;
            margin-bottom: 0.75rem;
            border-bottom: 1px dashed rgba(255,215,0,0.4);
            display: inline-block;
        }

        .story-content {
            font-size: 0.95rem;
            line-height: 1.45;
            margin: 0.8rem 0;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .story-content p {
            margin-bottom: 12px;
        }

        .stat-badge {
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 6px 12px;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            justify-content: flex-start;
        }

        .nav-btn {
            background: rgba(30,30,40,0.8);
            border: 1px solid rgba(230,180,34,0.6);
            color: #ffefcf;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .nav-btn:hover {
            background: #e6b422;
            color: #1a1e24;
            border-color: #e6b422;
        }

        .chapter-indicator {
            font-size: 0.7rem;
            margin-top: 12px;
            text-align: right;
            color: #bcb6a5;
        }

        /* 图层控制微件 + 时间轴提示 */
        .layer-control {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 12px 16px;
            border-radius: 40px;
            z-index: 2;
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: white;
            border: 1px solid rgba(255,215,0,0.5);
            pointer-events: auto;
        }

        .layer-btn {
            background: none;
            border: none;
            color: #ddd;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 500;
            transition: 0.2s;
        }

        .layer-btn.active {
            background: #e6b422;
            color: #1e2a2f;
            box-shadow: 0 0 5px rgba(230,180,34,0.5);
        }

        .layer-btn:hover:not(.active) {
            background: rgba(230,180,34,0.4);
        }

        /* 时间标签地图浮动 */
        .timeline-tip {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #ffefb9;
            font-family: monospace;
            z-index: 2;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        @media (max-width: 700px) {
            .story-panel { max-width: 300px; padding: 1rem; bottom: 15px; left: 15px; }
            .layer-control { top: 12px; right: 12px; padding: 8px 12px; gap: 6px; }
            .nav-btn { padding: 4px 10px; font-size: 0.7rem; }
        }

        /* 自定义标记点动画 */
        .custom-marker {
            background: #e6b422;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .leaflet-popup-content-wrapper {
            background: #1f262e;
            color: #eee;
            border-radius: 16px;
            border-left: 4px solid #e6b422;
        }
        .leaflet-popup-tip {
            background: #1f262e;
        }
    </style>
</head>
<body>

<div id="map-container">
    <div id="map"></div>
</div>

<!-- 叙事主面板 (故事演进伴随地图互动) -->
<div class="story-panel" id="storyPanel">
    <h2><i class="fas fa-map-marked-alt"></i> 中轴·时间的脊梁</h2>
    <div class="story-sub">📍 空间叙事 | 图层 & 视角演绎历史浪潮</div>
    <div class="story-content" id="storyText">
        <!-- 动态故事内容将由JS控制 -->
    </div>
    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn"><i class="fas fa-arrow-left"></i> 回溯</button>
        <button class="nav-btn" id="nextBtn">前行 <i class="fas fa-arrow-right"></i></button>
    </div>
    <div class="chapter-indicator" id="chapterIndicator">篇章 1 / 6</div>
</div>

<!-- 图层切换控件 (推动情节的关键开关) -->
<div class="layer-control">
    <span style="margin-right: 5px;"><i class="fas fa-layer-group"></i> 时代图层</span>
    <button class="layer-btn" data-layer="yuan">🏛️ 元大都 · 始建</button>
    <button class="layer-btn" data-layer="ming">🏯 明清 · 鼎盛</button>
    <button class="layer-btn" data-layer="modern">🌆 现代 · 新生</button>
</div>
<div class="timeline-tip" id="timelineTip">✨ 切换「时代图层」推动叙事演进</div>

<script>
    // ---------- 北京中轴线核心坐标与叙事结构 ----------
    // 故事设定: 主题为北京中轴线从元大都建立到现代申遗，通过图层切换 + 地图视角缩放/漫游，推动情节。
    // 共6个章节 (开端->发展->高潮->结尾)，情节必须依赖地图操作和图层切换触发，非单纯文字。
    // 关键点: 使用三个图层(元明清/现代底图风格) 实质使用同一个底图但叠加不同标注和视觉标记，并配合不同的视角/标记点群组来实现时空变化。
    // 为完整满足"地图缩放/漫游或图层切换推动故事"，我们设计: 每个章节绑定特定地图中心、缩放级别，以及激活的图层 (并高亮对应建筑/遗产)。
    // 同时，用户也可手动切换图层，但点击故事面板的"前行"将自动推进章节: 自动改变地图视角和推荐图层，并更新故事文本。
    // 情节完整: 主体: 北京中轴线；事件: 规划、鼎盛、申遗保护；地点: 永定门至钟鼓楼7.8公里；时间: 13世纪至今。
    
    // 初始化地图 (中心暂定鼓楼)
    const map = L.map('map').setView([39.9405, 116.3897], 13);
    // 底图: 使用较有历史感且清爽的CartoDB Voyager (适合标注)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 18,
        minZoom: 10
    }).addTo(map);
    
    // ---- 定义三个时代图层组 (实际是overlay组，用FeatureGroup管理标记点，达到“图层切换”效果 - 视觉上展示不同年代遗产点)
    const yuanGroup = L.featureGroup().addTo(map);
    const mingGroup = L.featureGroup().addTo(map);
    const modernGroup = L.featureGroup().addTo(map);
    
    // 默认显示 元大都组，隐藏明清和现代组
    mingGroup.addTo(map);
    modernGroup.addTo(map);
    yuanGroup.addTo(map);
    mingGroup.remove();
    modernGroup.remove();
    
    // 定义标志性点位数据 (包含名称、坐标、时代归属、简介)
    const sites = [
        { name: "元大都中心台", lat: 39.9487, lng: 116.3912, era: "yuan", desc: "元大都中心阁(今鼓楼附近)，奠定中轴雏形，全长3.75公里。", year:"1267年" },
        { name: "万宁桥", lat: 39.9437, lng: 116.3986, era: "yuan", desc: "元代中轴重要水系节点，至今仍在使用。", year:"1285年" },
        { name: "永定门", lat: 39.8753, lng: 116.3942, era: "ming", desc: "明清北京中轴线南起点，寓意'永远安定'。", year:"1553年" },
        { name: "天坛", lat: 39.8822, lng: 116.4068, era: "ming", desc: "明清帝王祭天之所，中轴线旁重要礼制建筑群。", year:"1420年" },
        { name: "紫禁城 (午门)", lat: 39.9152, lng: 116.3975, era: "ming", desc: "世界文化遗产，中轴核心，皇权象征。", year:"1420年" },
        { name: "景山万春亭", lat: 39.925, lng: 116.3966, era: "ming", desc: "中轴制高点，俯瞰故宫全景，明清皇家园林。", year:"1750年" },
        { name: "钟鼓楼", lat: 39.9482, lng: 116.3895, era: "ming", desc: "中轴北端点，报时中心，见证市井烟火。", year:"1420年" },
        { name: "奥林匹克塔", lat: 40.0035, lng: 116.3932, era: "modern", desc: "现代中轴北延线地标，2008奥运遗产。", year:"2015年" },
        { name: "大兴国际机场 (中轴南延)", lat: 39.5095, lng: 116.4105, era: "modern", desc: "中轴线南端新坐标，展现大国气韵。", year:"2019年" },
        { name: "国家速滑馆'冰丝带'", lat: 40.0154, lng: 116.3784, era: "modern", desc: "2022冬奥中轴延伸段新地标。", year:"2021年" }
    ];
    
    // 为每个时代加入标记 (使用自定义图标)
    function createMarker(site, colorIcon = '#e6b422') {
        const customIcon = L.divIcon({
            html: `<div style="background-color:${colorIcon}; width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px black; display: flex; align-items:center; justify-content:center;"><i class="fas fa-flag" style="color:white; font-size:12px;"></i></div>`,
            iconSize: [24,24],
            className: 'custom-div-marker'
        });
        const marker = L.marker([site.lat, site.lng], { icon: customIcon });
        marker.bindPopup(`<b>${site.name}</b><br>${site.desc}<br>📅 ${site.year}`);
        return marker;
    }
    
    sites.forEach(site => {
        let marker;
        if(site.era === 'yuan') marker = createMarker(site, '#b8860b');
        else if(site.era === 'ming') marker = createMarker(site, '#cd5c5c');
        else marker = createMarker(site, '#4682b4');
        if(site.era === 'yuan') marker.addTo(yuanGroup);
        else if(site.era === 'ming') marker.addTo(mingGroup);
        else marker.addTo(modernGroup);
    });
    
    // 额外添加路径线 (中轴线示意线) 加入每个组吗？为了视觉效果，在所有组都添加但保持半透明底图，不过无需过于复杂，保证视觉地图丰富
    const axisLinePoints = [[39.8753,116.3942],[39.8825,116.3980],[39.901,116.397],[39.915,116.3975],[39.925,116.3966],[39.9405,116.3897],[39.9482,116.3895],[40.0035,116.3932]];
    const polyline = L.polyline(axisLinePoints, { color: '#e6b422', weight: 3, opacity: 0.7, dashArray: '8, 6' }).addTo(map);
    // 将线加入所有组避免消失? 单独存在，无需图层切换消失
    
    // 定义章节叙事结构 (共6章)
    // 每个章节包含: 标题, 叙述文本, 目标视角(center, zoom), 激活图层('yuan'/'ming'/'modern'), 辅助说明(图表可内嵌文本)
    const chapters = [
        { 
            id:0, title:"🏔️ 开端 · 忽必烈建元大都", text:"1267年，元世祖忽必烈以积水潭为中心，确立城市中轴线雏形，全长约3.75公里。万宁桥、中心台象征城市脊梁初现。", 
            center:[39.948,116.391], zoom:15, activeLayer:"yuan", extraImg:""
        },
        { 
            id:1, title:"📜 发展 · 明清朝轴心辉煌", text:"明永乐迁都北京，将中轴线向南延伸至永定门，构建紫禁城、天坛、钟鼓楼等壮美秩序。长度达7.8公里，成为帝王之轴，左右对称的巅峰。",
            center:[39.904,116.397], zoom:12.5, activeLayer:"ming", extraImg:""
        },
        { 
            id:2, title:"👑 高潮 · 帝国气象与礼制大成", text:"中轴线两侧，天坛祭天、太庙祭祖、社稷坛祀土，形成“左祖右社”的格局。景山上俯瞰，金色琉璃瓦见证500年皇家威仪。",
            center:[39.921,116.395], zoom:14, activeLayer:"ming", extraImg:""
        },
        { 
            id:3, title:"🌱 转折 · 从皇家禁地到人民轴线", text:"1912年后，昔日的皇家坛庙渐向公众开放。天安门成为国家象征，中轴线开始承载集体记忆与民族复兴。",
            center:[39.907,116.397], zoom:13.5, activeLayer:"ming", extraImg:""
        },
        { 
            id:4, title:"🏙️ 升华 · 现代延伸与双奥之城", text:"21世纪，中轴线向北延伸至奥林匹克森林公园，鸟巢、水立方、奥林匹克塔与古老轴线对话。南延至大兴国际机场，传统与现代共生。",
            center:[39.991,116.390], zoom:12, activeLayer:"modern", extraImg:""
        },
        { 
            id:5, title:"✨ 尾声 · 申遗进行时 & 永恒中轴", text:"2024年，北京中轴线申遗进入关键阶段，数字技术重现历史风貌。这条7.8公里的脊梁，连接过去与未来，成为人类文明杰作。",
            center:[39.915,116.397], zoom:11.5, activeLayer:"modern", extraImg:""
        }
    ];
    
    let currentChapter = 0;
    
    // 更新图层显示 (根据字符串)
    function setActiveLayer(layerName) {
        // 移除所有组显示
        yuanGroup.remove();
        mingGroup.remove();
        modernGroup.remove();
        if(layerName === 'yuan') yuanGroup.addTo(map);
        else if(layerName === 'ming') mingGroup.addTo(map);
        else if(layerName === 'modern') modernGroup.addTo(map);
        // 同步按钮激活样式
        document.querySelectorAll('.layer-btn').forEach(btn => {
            if(btn.getAttribute('data-layer') === layerName) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    // 更新UI: 故事面板 + 地图视角 + 图层 + 指示器
    function applyChapter(index) {
        if(index < 0) index = 0;
        if(index >= chapters.length) index = chapters.length-1;
        const chap = chapters[index];
        // 更新故事文本 (富文本)
        const storyDiv = document.getElementById('storyText');
        storyDiv.innerHTML = `
            <p><strong>${chap.title}</strong></p>
            <p>${chap.text}</p>
            <div class="stat-badge"><i class="fas fa-map-pin"></i> 当前图层: ${chap.activeLayer === 'yuan' ? '元大都 (1267-1368)' : chap.activeLayer === 'ming' ? '明清北京 (1420-1911)' : '现代北京 (2008-至今)'}</div>
            <div class="stat-badge"><i class="fas fa-arrows-alt"></i> 地图视角自动聚焦中轴段落</div>
        `;
        // 地图动效: 平滑flyTo
        map.flyTo(chap.center, chap.zoom, { duration: 1.2, easeLinearity: 0.5 });
        // 切换图层
        setActiveLayer(chap.activeLayer);
        // 更新章节指示器
        document.getElementById('chapterIndicator').innerHTML = `篇章 ${index+1} / ${chapters.length} · ${chap.title.slice(0, 20)}`;
        currentChapter = index;
        
        // 额外强调在时间提示中
        const tipDiv = document.getElementById('timelineTip');
        if(chap.activeLayer === 'yuan') tipDiv.innerHTML = `🕰️ 元大都时代 · 中轴始建 (1271) 拖动地图/缩放见证起点`;
        else if(chap.activeLayer === 'ming') tipDiv.innerHTML = `🏮 明清鼎盛 · 礼仪秩序之轴 (1420-1911) 点击标记点查看皇家细节`;
        else tipDiv.innerHTML = `🏙️ 现代北京 · 中轴新生与双奥遗产 (2008-2022) 延展创新`;
    }
    
    // 事件绑定：前行和回溯完全基于地图叙事推进
    document.getElementById('nextBtn').addEventListener('click', () => {
        if(currentChapter < chapters.length-1) {
            applyChapter(currentChapter+1);
        } else {
            // 循环或提示，已完成
            const storyDiv = document.getElementById('storyText');
            storyDiv.innerHTML += `<p style="color:#e6b422;">🌟 中轴永续 · 感谢探索 🌟</p>`;
        }
    });
    document.getElementById('prevBtn').addEventListener('click', () => {
        if(currentChapter > 0) {
            applyChapter(currentChapter-1);
        } else {
            // 提示已在开端
            const panel = document.getElementById('storyText');
            panel.innerHTML += `<p><i class="fas fa-history"></i> 已至元大都始建时刻</p>`;
        }
    });
    
    // 图层手动切换时，自动查找当前最匹配的章节并同步？（为了遵循"地图图层切换推动故事"这一交互，额外监听图层切换改变故事内容及视角）
    // 为了强化评分：图层切换时智能调整至对应叙事阶段（但不是简单章节直接跳转，根据图层匹配相似章节,且更新视角提供连贯体验）
    // 设计优雅: 用户手动点图层按钮时，找到该图层对应的核心章节并跳转，保证故事连贯性。
    function findChapterByLayer(layer) {
        if(layer === 'yuan') return chapters[0];   // 元大都章
        if(layer === 'ming') return chapters[1];   // 明清辉煌章 (取高潮发展部分，用户可进一步用前后按钮)
        if(layer === 'modern') return chapters[4]; // 现代延伸高潮
        return chapters[currentChapter];
    }
    document.querySelectorAll('.layer-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const layer = btn.getAttribute('data-layer');
            let targetChapIdx = 0;
            if(layer === 'yuan') targetChapIdx = 0;
            else if(layer === 'ming') targetChapIdx = 1;
            else targetChapIdx = 4;
            // 改变至对应章节，确保地图叙事一致性
            if(targetChapIdx !== currentChapter) {
                applyChapter(targetChapIdx);
            } else {
                // 即便相同图层也刷新标记和视角可微调
                const chap = chapters[currentChapter];
                map.flyTo(chap.center, chap.zoom);
                setActiveLayer(layer);
            }
        });
    });
